name: Build AnthorOS

on:
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday at 03:00 UTC
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      step:
        description: 'Single step to run (fetch/unpack/rebrand/packages/iso/all)'
        required: false
        default: 'all'
      publish_release:
        description: 'Publish as a GitHub Release'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout on the Ubuntu runner (Node 20 works fine here) ──────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Portage snapshot cache (on the Ubuntu runner's filesystem) ───────────
      - name: Get week number
        id: date
        run: echo "week=$(date +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Restore Portage snapshot cache
        id: portage-cache
        uses: actions/cache@v4
        with:
          path: /tmp/portage-cache
          key: portage-snapshot-${{ steps.date.outputs.week }}-${{ hashFiles('config/package.list') }}
          restore-keys: |
            portage-snapshot-${{ steps.date.outputs.week }}-
            portage-snapshot-

      # ── Run the entire build inside the Gentoo musl container ───────────────
      - name: Build AnthorOS
        run: |
          mkdir -p /tmp/portage-cache /tmp/anthoros-output

          docker run --rm --privileged \
            -v "$(pwd)":/anthoros \
            -v /tmp/portage-cache:/var/db/repos/gentoo \
            -v /tmp/anthoros-output:/build/anthoros/output \
            -e WORK_DIR=/build/anthoros \
            -e PORTAGE_CACHE_HIT=${{ steps.portage-cache.outputs.cache-hit }} \
            gentoo/stage3:musl-llvm \
            bash -c '
              set -euo pipefail

              # Install host build tools
              if [[ "${PORTAGE_CACHE_HIT}" != "true" ]]; then
                echo ">>> Syncing Portage (cache miss)..."
                emerge-webrsync -q
              else
                echo ">>> Portage cache hit, skipping sync."
              fi

              emerge --nospinner -q \
                sys-fs/squashfs-tools \
                dev-libs/libisoburn \
                sys-boot/grub

              chmod +x /anthoros/scripts/*.sh

              # Run build steps
              cd /anthoros
              WORK_DIR=/build/anthoros ./scripts/build.sh fetch
              WORK_DIR=/build/anthoros ./scripts/build.sh unpack
              WORK_DIR=/build/anthoros ./scripts/build.sh rebrand
              WORK_DIR=/build/anthoros ./scripts/build.sh packages
              WORK_DIR=/build/anthoros ./scripts/build.sh iso
            '

      # ── Upload artifacts (every build) ───────────────────────────────────────
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: anthoros-iso-${{ github.run_number }}
          path: |
            /tmp/anthoros-output/*.iso
            /tmp/anthoros-output/*.iso.sha256
          retention-days: 14

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: anthoros-stage3-${{ github.run_number }}
          path: |
            /tmp/anthoros-output/*.tar.xz
            /tmp/anthoros-output/*.tar.xz.sha256
          retention-days: 14

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Set release flag
        id: should-release
        run: |
          RELEASE=false
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            RELEASE=true
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && \
                  "${{ github.event.inputs.publish_release }}" == "true" ]]; then
            RELEASE=true
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            RELEASE=true
          fi
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Generate release tag
        if: steps.should-release.outputs.release == 'true'
        id: release-tag
        run: echo "tag=rolling-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Delete existing rolling release (if present)
        if: steps.should-release.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.release-tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --yes 2>/dev/null || true
          git push origin ":refs/tags/${{ steps.release-tag.outputs.tag }}" \
            2>/dev/null || true

      - name: Create GitHub Release
        if: steps.should-release.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_DATE=$(date +%Y-%m-%d)
          TAG="${{ steps.release-tag.outputs.tag }}"

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "AnthorOS Rolling Build ${BUILD_DATE}" \
            --notes "## AnthorOS Rolling Build — ${BUILD_DATE}

          Built from Gentoo stage3 musl+llvm+openrc.

          ### Downloads
          | File | Description |
          |---|---|
          | \`anthoros-amd64-*.iso\` | Bootable ISO (BIOS + UEFI) |
          | \`anthoros-stage3-amd64-*.tar.xz\` | Rootfs tarball |
          | \`*.sha256\` | SHA-256 checksums |

          ### Verify
          \`\`\`bash
          sha256sum -c anthoros-amd64-${BUILD_DATE}.iso.sha256
          sha256sum -c anthoros-stage3-amd64-${BUILD_DATE}.tar.xz.sha256
          \`\`\`

          Built by GitHub Actions · Run \`${{ github.run_number }}\`" \
            --latest \
            /tmp/anthoros-output/*.iso \
            /tmp/anthoros-output/*.iso.sha256 \
            /tmp/anthoros-output/*.tar.xz \
            /tmp/anthoros-output/*.tar.xz.sha256
