name: Build AnthorOS

on:
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday at 03:00 UTC
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'config/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      step:
        description: 'Single step to run (fetch/unpack/rebrand/packages/iso/all)'
        required: false
        default: 'all'
      publish_release:
        description: 'Publish as a GitHub Release'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to create releases

    container:
      image: gentoo/stage3:musl-llvm
      options: --privileged   # Required for chroot bind mounts

    env:
      WORK_DIR: /build/anthoros
      BUILD_STEP: ${{ github.event.inputs.step || 'all' }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      # ── Portage snapshot cache ────────────────────────────────────────────────
      - name: Restore Portage snapshot cache
        id: portage-cache
        uses: actions/cache@v4
        with:
          path: /var/db/repos/gentoo
          key: portage-snapshot-${{ runner.os }}-${{ hashFiles('config/package.list') }}-${{ steps.date.outputs.week }}
          restore-keys: |
            portage-snapshot-${{ runner.os }}-${{ hashFiles('config/package.list') }}-
            portage-snapshot-${{ runner.os }}-

      - name: Get week number (for cache key)
        id: date
        run: echo "week=$(date +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Sync Portage (if cache miss or stale)
        if: steps.portage-cache.outputs.cache-hit != 'true'
        run: emerge-webrsync -q

      # ── Host tools ────────────────────────────────────────────────────────────
      - name: Install host build dependencies
        run: |
          emerge --nospinner -q \
            sys-fs/squashfs-tools \
            dev-libs/libisoburn \
            sys-boot/grub

      # ── Build steps ───────────────────────────────────────────────────────────
      - name: Fetch stage3
        run: ./scripts/build.sh fetch

      - name: Unpack stage3
        run: ./scripts/build.sh unpack

      - name: Rebrand
        run: ./scripts/build.sh rebrand

      - name: Install packages
        run: ./scripts/build.sh packages

      - name: Build ISO and tarball
        run: ./scripts/build.sh iso

      # ── Artifacts (always uploaded for every build) ───────────────────────────
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: anthoros-iso-${{ github.run_number }}
          path: |
            /build/anthoros/output/*.iso
            /build/anthoros/output/*.iso.sha256
          retention-days: 14

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: anthoros-stage3-${{ github.run_number }}
          path: |
            /build/anthoros/output/*.tar.xz
            /build/anthoros/output/*.tar.xz.sha256
          retention-days: 14

      # ── GitHub Release ────────────────────────────────────────────────────────
      # Publishes on: weekly schedule, manual trigger with publish_release=true,
      # or a version tag push (v*)
      - name: Set release flag
        id: should-release
        run: |
          RELEASE=false
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            RELEASE=true
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && \
                  "${{ github.event.inputs.publish_release }}" == "true" ]]; then
            RELEASE=true
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            RELEASE=true
          fi
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Generate release tag
        if: steps.should-release.outputs.release == 'true'
        id: release-tag
        run: echo "tag=rolling-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Delete existing rolling release (if present)
        if: steps.should-release.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.release-tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --yes 2>/dev/null || true
          git push origin ":refs/tags/${{ steps.release-tag.outputs.tag }}" \
            2>/dev/null || true

      - name: Create GitHub Release
        if: steps.should-release.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_DATE=$(date +%Y-%m-%d)
          TAG="${{ steps.release-tag.outputs.tag }}"

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "AnthorOS Rolling Build ${BUILD_DATE}" \
            --notes "## AnthorOS Rolling Build — ${BUILD_DATE}

          Built from Gentoo stage3 musl+llvm+openrc.

          ### Downloads
          | File | Description |
          |---|---|
          | \`anthoros-amd64-*.iso\` | Bootable ISO (BIOS + UEFI) |
          | \`anthoros-stage3-amd64-*.tar.xz\` | Rootfs tarball |
          | \`*.sha256\` | SHA-256 checksums |

          ### Verify
          \`\`\`bash
          sha256sum -c anthoros-amd64-${BUILD_DATE}.iso.sha256
          sha256sum -c anthoros-stage3-amd64-${BUILD_DATE}.tar.xz.sha256
          \`\`\`

          Built by GitHub Actions · Run \`${{ github.run_number }}\`" \
            --latest \
            /build/anthoros/output/*.iso \
            /build/anthoros/output/*.iso.sha256 \
            /build/anthoros/output/*.tar.xz \
            /build/anthoros/output/*.tar.xz.sha256
