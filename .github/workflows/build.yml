name: Build AnthorOS

on:
  schedule:
    - cron: '0 3 * * 0'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish as a GitHub Release'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    container:
      image: gentoo/stage3:musl-llvm
      options: --privileged

    steps:
      - name: Install dependencies
        run: |
          mkdir -p /var/db/repos/gentoo
          emerge-webrsync -q

          mkdir -p /etc/portage/package.accept_keywords
          echo "dev-util/catalyst ~amd64" > /etc/portage/package.accept_keywords/catalyst

          mkdir -p /etc/portage/package.use
          echo "sys-apps/util-linux python" > /etc/portage/package.use/catalyst-host
          echo "sys-boot/grub grub_platforms_efi-32 grub_platforms_efi-64 grub_platforms_pc" >> /etc/portage/package.use/catalyst-host

          emerge --nospinner -q \
            dev-util/catalyst \
            dev-vcs/git

      - name: Patch Catalyst to use gentoo-kernel-bin
        run: |
          echo "Searching for kmerge.sh..."
          KMERGE=""
          while IFS= read -r -d "" f; do
            KMERGE="${f}"
            break
          done < <(find / -name kmerge.sh -print0 2>/dev/null)
          if [[ -z "${KMERGE}" ]]; then
            echo "ERROR: kmerge.sh not found anywhere"
            exit 1
          fi
          echo "Found: ${KMERGE}"
          sed -i 's|sys-kernel/gentoo-kernel"|sys-kernel/gentoo-kernel-bin"|' "${KMERGE}"
          echo "Verified:"
          grep "ksource" "${KMERGE}"

      - name: Checkout repository
        run: |
          git clone --depth=1 https://github.com/choccynix/AnthorISO.git /anthoros

      - name: Set VERSION
        run: echo "VERSION=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Run build
        run: |
          chmod +x /anthoros/scripts/build.sh
          cd /anthoros
          VERSION="${VERSION}" ./scripts/build.sh

      - name: Set release flag
        id: should-release
        run: |
          RELEASE=false
          if [[ "${{ github.event_name }}" == "schedule" ]]; then RELEASE=true; fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.publish_release }}" == "true" ]]; then RELEASE=true; fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then RELEASE=true; fi
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.should-release.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="rolling-${VERSION}"
          BUILD_DATE=$(date +%Y-%m-%d)

          gh release delete "${TAG}" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          git -C /anthoros push origin ":refs/tags/${TAG}" 2>/dev/null || true

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "AnthorOS Rolling Build ${BUILD_DATE}" \
            --notes "## AnthorOS Rolling Build — ${BUILD_DATE}

          Built from Gentoo stage3 musl+llvm+openrc using Catalyst.

          ### Downloads
          | File | Description |
          |---|---|
          | \`anthoros-amd64-*.iso\` | Bootable ISO (BIOS + UEFI) |
          | \`anthoros-stage3-amd64-*.tar.xz\` | Rootfs tarball |
          | \`*.sha256\` | SHA-256 checksums |

          Built by GitHub Actions · Run \`${{ github.run_number }}\`" \
            --latest \
            /anthoros/output/*.iso \
            /anthoros/output/*.iso.sha256 \
            /anthoros/output/*.tar.xz \
            /anthoros/output/*.tar.xz.sha256
