name: Build AnthorOS

on:
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday at 03:00 UTC
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish as a GitHub Release'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    container:
      image: gentoo/stage3:musl-llvm
      options: --privileged

    env:
      VERSION: ${{ github.run_number }}-${{ github.sha }}

    steps:
      - name: Install dependencies
        run: |
          # repos.conf points here but the dir doesn't exist yet in the container
          mkdir -p /var/db/repos/gentoo

          emerge-webrsync -q

          # Catalyst is ~amd64 only — accept it explicitly
          mkdir -p /etc/portage/package.accept_keywords
          echo "dev-util/catalyst ~amd64" > /etc/portage/package.accept_keywords/catalyst

          # USE flags required by catalyst and its deps
          mkdir -p /etc/portage/package.use
          echo "sys-apps/util-linux python" > /etc/portage/package.use/catalyst-host
          echo "sys-boot/grub grub_platforms_efi-32 grub_platforms_efi-64 grub_platforms_pc" >> /etc/portage/package.use/catalyst-host

          emerge --nospinner -q \
            dev-util/catalyst \
            dev-vcs/git

      - name: Checkout repository
        run: |
          git clone --depth=1 "https://github.com/${{ github.repository }}.git" /anthoros
          cd /anthoros
          git checkout "${{ github.sha }}" 2>/dev/null || true

      - name: Cache Portage tree
        uses: actions/cache@v4
        with:
          path: /var/db/repos/gentoo
          key: portage-${{ runner.os }}-${{ hashFiles('/anthoros/catalyst/specs/*.spec') }}-$(date +%Y-W%V)
          restore-keys: |
            portage-${{ runner.os }}-

      - name: Set VERSION
        run: echo "VERSION=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Run build
        run: |
          chmod +x /anthoros/scripts/build.sh
          cd /anthoros
          VERSION="${VERSION}" ./scripts/build.sh

      # ── Artifacts ─────────────────────────────────────────────────────────────
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: anthoros-iso-${{ github.run_number }}
          path: |
            /anthoros/output/*.iso
            /anthoros/output/*.iso.sha256
          retention-days: 14

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: anthoros-stage3-${{ github.run_number }}
          path: |
            /anthoros/output/*.tar.xz
            /anthoros/output/*.tar.xz.sha256
          retention-days: 14

      # ── GitHub Release ─────────────────────────────────────────────────────────
      - name: Set release flag
        id: should-release
        run: |
          RELEASE=false
          if [[ "${{ github.event_name }}" == "schedule" ]]; then RELEASE=true; fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && \
                "${{ github.event.inputs.publish_release }}" == "true" ]]; then RELEASE=true; fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then RELEASE=true; fi
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.should-release.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="rolling-${VERSION}"
          BUILD_DATE=$(date +%Y-%m-%d)

          gh release delete "${TAG}" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          git -C /anthoros push origin ":refs/tags/${TAG}" 2>/dev/null || true

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "AnthorOS Rolling Build ${BUILD_DATE}" \
            --notes "## AnthorOS Rolling Build — ${BUILD_DATE}

          Built from Gentoo stage3 musl+llvm+openrc using Catalyst.

          ### Downloads
          | File | Description |
          |---|---|
          | \`anthoros-amd64-*.iso\` | Bootable ISO (BIOS + UEFI) |
          | \`anthoros-stage3-amd64-*.tar.xz\` | Rootfs tarball |
          | \`*.sha256\` | SHA-256 checksums |

          ### Verify
          \`\`\`bash
          sha256sum -c anthoros-amd64-${BUILD_DATE}.iso.sha256
          sha256sum -c anthoros-stage3-amd64-${BUILD_DATE}.tar.xz.sha256
          \`\`\`

          Built by GitHub Actions · Run \`${{ github.run_number }}\`" \
            --latest \
            /anthoros/output/*.iso \
            /anthoros/output/*.iso.sha256 \
            /anthoros/output/*.tar.xz \
            /anthoros/output/*.tar.xz.sha256
